<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Launch Pad Story - Poster</title>
<style>
  @page { size: 8.5in 11in; margin: 0; }
  html, body { margin: 0; padding: 0; background: #13133a; }
  .poster { width: 816px; height: 1056px; }
  svg { display: block; width: 816px; height: 1056px; }
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  @media print { * { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
</style>
</head>
<body>
<div class="poster">
<svg viewBox="0 0 816 1056" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#13133a"/>
      <stop offset="28%" stop-color="#2a2a63"/>
      <stop offset="52%" stop-color="#2c6f78"/>
      <stop offset="76%" stop-color="#b06636"/>
      <stop offset="100%" stop-color="#ecae54"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect x="0" y="0" width="816" height="1056" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="70" cy="95" r="1.5" opacity="0.7"/>
    <circle cx="120" cy="210" r="2" opacity="0.8"/>
    <circle cx="110" cy="330" r="1" opacity="0.5"/>
    <circle cx="210" cy="150" r="1.2" opacity="0.5"/>
    <circle cx="265" cy="265" r="2.2" opacity="0.9"/>
    <circle cx="470" cy="150" r="1" opacity="0.4"/>
    <circle cx="560" cy="120" r="1.4" opacity="0.6"/>
    <circle cx="640" cy="250" r="1.6" opacity="0.7"/>
    <circle cx="600" cy="330" r="1" opacity="0.5"/>
    <circle cx="690" cy="175" r="2" opacity="0.85"/>
    <circle cx="735" cy="275" r="1.5" opacity="0.7"/>
    <circle cx="765" cy="120" r="1.4" opacity="0.6"/>
    <circle cx="180" cy="410" r="1.5" opacity="0.5"/>
    <circle cx="400" cy="430" r="1" opacity="0.4"/>
    <circle cx="560" cy="420" r="1.5" opacity="0.5"/>
    <circle cx="705" cy="385" r="1" opacity="0.45"/>
    <circle cx="95" cy="460" r="1.2" opacity="0.4"/>
    <circle cx="305" cy="510" r="1" opacity="0.35"/>
    <circle cx="625" cy="470" r="1.2" opacity="0.4"/>
    <circle cx="745" cy="450" r="1" opacity="0.35"/>
  </g>

  <!-- title -->
  <text x="408" y="90" text-anchor="middle" fill="#ffffff" font-size="44" font-weight="800" letter-spacing="2">THE LAUNCH PAD STORY</text>
  <text x="408" y="124" text-anchor="middle" fill="#cfcfe6" font-size="17" letter-spacing="1">A turning three-year cycle for ages 15 to 18</text>

  <!-- destination star -->
  <circle cx="360" cy="190" r="52" fill="#e2b23a" opacity="0.16"/>
  <circle cx="360" cy="190" r="32" fill="#e2b23a" opacity="0.22"/>
  <path d="M360,162 L367.05,180.29 L386.63,181.35 L371.41,193.71 L376.45,212.65 L360,202 L343.55,212.65 L348.59,193.71 L333.37,181.35 L352.95,180.29 Z" fill="#f3d06a" stroke="#fff7df" stroke-width="1.5"/>
  <text x="360" y="248" text-anchor="middle" fill="#f3d27a" font-size="13" letter-spacing="2" font-weight="700">YOUR NEXT GREAT ADVENTURE</text>

  <!-- rocket -->
  <g>
    <!-- exhaust trail -->
    <path d="M334,656 L346,656 L356,880 L324,880 Z" fill="#e2b23a" opacity="0.10"/>
    <line x1="340" y1="652" x2="340" y2="872" stroke="#e2b23a" stroke-width="2.5" stroke-dasharray="2 9" opacity="0.55"/>
    <!-- body -->
    <path d="M340,398 L318,456 L362,456 Z" fill="#d98a2b"/>
    <rect x="318" y="452" width="44" height="106" rx="11" fill="#f6f1e7" stroke="#cdb79a" stroke-width="2"/>
    <rect x="318" y="522" width="44" height="7" fill="#5B5B8A" opacity="0.45"/>
    <circle cx="340" cy="488" r="12" fill="#2A9D8F" stroke="#ffffff" stroke-width="2.5"/>
    <!-- fins -->
    <path d="M318,534 L298,578 L318,560 Z" fill="#5B5B8A"/>
    <path d="M362,534 L382,578 L362,560 Z" fill="#5B5B8A"/>
    <!-- nozzle -->
    <rect x="330" y="556" width="20" height="10" rx="2" fill="#8a7a5a"/>
    <!-- flame -->
    <path d="M328,566 L352,566 L340,650 Z" fill="#e8902b"/>
    <path d="M332,566 L348,566 L340,628 Z" fill="#f6c64b"/>
    <path d="M336,566 L344,566 L340,606 Z" fill="#fff3cf"/>
  </g>

  <!-- launch gantry + pad -->
  <g stroke="#6b4a2a" stroke-width="4" opacity="0.7" fill="none">
    <line x1="402" y1="732" x2="402" y2="884"/>
    <line x1="402" y1="772" x2="374" y2="772"/>
    <line x1="402" y1="814" x2="374" y2="814"/>
    <line x1="402" y1="856" x2="374" y2="856"/>
  </g>
  <rect x="312" y="882" width="56" height="9" rx="3" fill="#7a5230" opacity="0.85"/>
  <path d="M-20,906 Q408,874 836,906" fill="none" stroke="#f0c074" stroke-width="3" opacity="0.5"/>

  <!-- season waypoints -->
  <g>
    <circle cx="486" cy="338" r="9" fill="#5B5B8A"/>
    <text x="508" y="334" fill="#ffffff" font-size="22" font-weight="700">THE HELM</text>
    <text x="508" y="356" fill="#cdcde6" font-size="15">What's the hard call?</text>

    <circle cx="486" cy="520" r="9" fill="#2A9D8F"/>
    <text x="508" y="516" fill="#ffffff" font-size="22" font-weight="700">THE FORGE</text>
    <text x="508" y="538" fill="#e3f1ee" font-size="15">What's worth solving?</text>

    <circle cx="486" cy="702" r="9" fill="#d98a2b"/>
    <text x="508" y="698" fill="#ffffff" font-size="22" font-weight="700">ORIGIN</text>
    <text x="508" y="720" fill="#fbeedd" font-size="15">Who am I?</text>
  </g>

  <!-- base thesis -->
  <text x="408" y="966" text-anchor="middle" fill="#3a2a14" font-size="20" font-weight="700">Know yourself. Do work that matters.</text>
  <text x="408" y="994" text-anchor="middle" fill="#3a2a14" font-size="20" font-weight="700">Make the hard calls. Love the life you're living.</text>
  <text x="408" y="1026" text-anchor="middle" fill="#6a4a24" font-size="13" letter-spacing="0.5">Vibrant Life Launch Pad   &#183;   A three-year formation for ages 15 to 18</text>
</svg>
</div>
</body>
</html>
