<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Launch Pad Story - Star Map Poster</title>
<style>
  @page { size: 8.5in 11in; margin: 0; }
  html, body { margin: 0; padding: 0; }
  .poster {
    width: 816px; height: 1056px; position: relative; overflow: hidden;
    background: #07070f; color: #fff;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  .neb { position: absolute; border-radius: 50%; filter: blur(2px); }
  .neb1 { width: 620px; height: 620px; left: -160px; top: 60px; background: radial-gradient(circle, rgba(42,157,143,0.22), transparent 62%); }
  .neb2 { width: 640px; height: 640px; right: -200px; top: 220px; background: radial-gradient(circle, rgba(91,91,138,0.30), transparent 62%); }
  .neb3 { width: 720px; height: 520px; left: 60px; bottom: -160px; background: radial-gradient(circle, rgba(226,178,58,0.16), transparent 62%); }

  /* LCARS-style frame */
  .rail { position: absolute; left: 24px; top: 24px; bottom: 28px; width: 58px; display: flex; flex-direction: column; gap: 7px; }
  .rb { border-radius: 6px; }
  .rb.amber { background: #E2B23A; } .rb.teal { background: #2A9D8F; } .rb.indigo { background: #6E6EA8; } .rb.rust { background: #C77B43; }
  .rb.elbow { height: 132px; border-top-left-radius: 30px; }
  .rb.h80 { height: 80px; } .rb.h120 { height: 120px; } .rb.grow { flex: 1; }
  .topbar { position: absolute; top: 24px; left: 90px; right: 32px; height: 28px; display: flex; gap: 8px; align-items: stretch; }
  .seg { border-radius: 6px; } .seg.long { flex: 1; background: #E2B23A; border-top-right-radius: 30px; }
  .seg.t { width: 96px; background: #2A9D8F; } .seg.i { width: 56px; background: #6E6EA8; }
  .railcode { color: #07070f; font-size: 10px; font-weight: 800; letter-spacing: 1px; text-align: right; padding: 6px 8px 0 0; }

  .content { position: relative; z-index: 3; box-sizing: border-box; height: 100%; padding: 70px 40px 32px 104px; display: flex; flex-direction: column; }
  .title { margin: 0; font-size: 42px; font-weight: 800; letter-spacing: 4px; color: #fff; }
  .tag { color: #E2B23A; font-size: 13px; letter-spacing: 4px; margin-top: 9px; font-weight: 600; }
  .screen { margin-top: 20px; border: 2px solid #23234a; border-radius: 20px; background: #04040b; overflow: hidden; }
  .screen svg { display: block; width: 100%; height: auto; }
  .mission { text-align: center; font-size: 27px; font-weight: 700; letter-spacing: 0.5px; margin: 26px 0 0; color: #fff; }
  .missionsub { text-align: center; color: #b9b9d6; font-size: 15px; letter-spacing: 1px; margin: 8px 0 0; }
  .cta { margin-top: auto; text-align: center; }
  .cta .big { color: #E2B23A; font-size: 25px; font-weight: 800; letter-spacing: 2px; margin: 0; }
  .cta .meta { color: #cfcfe0; font-size: 13px; letter-spacing: 1.5px; margin: 10px 0 0; }
  @media print { * { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
</style>
</head>
<body>
<div class="poster">
  <div class="neb neb1"></div><div class="neb neb2"></div><div class="neb neb3"></div>

  <!-- LCARS frame -->
  <div class="rail">
    <div class="rb amber elbow"><div class="railcode">VL&middot;01</div></div>
    <div class="rb teal h80"></div>
    <div class="rb indigo h120"></div>
    <div class="rb rust h80"></div>
    <div class="rb amber grow"></div>
  </div>
  <div class="topbar">
    <div class="seg long"></div>
    <div class="seg t"></div>
    <div class="seg i"></div>
  </div>

  <div class="content">
    <h1 class="title">THE LAUNCH PAD STORY</h1>
    <div class="tag">VIBRANT LIFE &#10022; A THREE-YEAR VOYAGE &#10022; AGES 15 TO 18</div>

    <div class="screen">
      <svg viewBox="0 0 660 420" xmlns="http://www.w3.org/2000/svg">
        <!-- starfield -->
        <g fill="#ffffff">
          <circle cx="40" cy="40" r="1.3" opacity="0.7"/><circle cx="120" cy="90" r="1" opacity="0.5"/>
          <circle cx="80" cy="200" r="1.2" opacity="0.6"/><circle cx="60" cy="330" r="1" opacity="0.5"/>
          <circle cx="200" cy="50" r="1" opacity="0.5"/><circle cx="260" cy="120" r="1.3" opacity="0.6"/>
          <circle cx="180" cy="300" r="1" opacity="0.45"/><circle cx="340" cy="60" r="1.1" opacity="0.55"/>
          <circle cx="400" cy="200" r="1" opacity="0.5"/><circle cx="360" cy="320" r="1.2" opacity="0.55"/>
          <circle cx="500" cy="110" r="1" opacity="0.5"/><circle cx="520" cy="260" r="1.1" opacity="0.5"/>
          <circle cx="610" cy="180" r="1" opacity="0.45"/><circle cx="620" cy="340" r="1.2" opacity="0.5"/>
          <circle cx="450" cy="370" r="1" opacity="0.4"/><circle cx="150" cy="160" r="1" opacity="0.4"/>
        </g>

        <!-- course line -->
        <path d="M95,350 L250,255 L405,160 L545,80" fill="none" stroke="#5a6a9a" stroke-width="2" stroke-dasharray="3 8"/>

        <!-- waypoints -->
        <circle cx="95" cy="350" r="20" fill="#E2B23A" opacity="0.16"/>
        <circle cx="95" cy="350" r="8" fill="#E2B23A" stroke="#fff3cf" stroke-width="1.5"/>
        <text x="116" y="346" fill="#E2B23A" font-size="16" font-weight="700">ORIGIN</text>
        <text x="116" y="364" fill="#cfd6e6" font-size="12">Who am I?</text>

        <circle cx="250" cy="255" r="20" fill="#2A9D8F" opacity="0.16"/>
        <circle cx="250" cy="255" r="8" fill="#2A9D8F" stroke="#dff1ee" stroke-width="1.5"/>
        <text x="271" y="251" fill="#46b9ab" font-size="16" font-weight="700">THE FORGE</text>
        <text x="271" y="269" fill="#cfd6e6" font-size="12">What's worth solving?</text>

        <circle cx="405" cy="160" r="20" fill="#8a8ad0" opacity="0.16"/>
        <circle cx="405" cy="160" r="8" fill="#8a8ad0" stroke="#e6e6f0" stroke-width="1.5"/>
        <text x="426" y="156" fill="#a6a6e0" font-size="16" font-weight="700">THE HELM</text>
        <text x="426" y="174" fill="#cfd6e6" font-size="12">What's the hard call?</text>

        <!-- ship icon mid-course -->
        <path d="M330,212 L344,205 L340,214 L352,212 L340,219 L344,226 L330,219 Z" fill="#fff" opacity="0.9"/>

        <!-- destination -->
        <circle cx="545" cy="80" r="46" fill="#e2b23a" opacity="0.14"/>
        <circle cx="545" cy="80" r="28" fill="#e2b23a" opacity="0.2"/>
        <path d="M545,50 L552.35,69.91 L572.29,71.35 L556.76,86.71 L561.81,106.65 L545,95.5 L528.19,106.65 L533.24,86.71 L517.71,71.35 L537.65,69.91 Z" fill="#f3d06a" stroke="#fff7df" stroke-width="1.5"/>
        <text x="545" y="132" text-anchor="middle" fill="#f3d27a" font-size="13" letter-spacing="2" font-weight="700">NEXT GREAT ADVENTURE</text>
      </svg>
    </div>

    <p class="mission">Take the helm of your own story.</p>
    <p class="missionsub">Know yourself. Find your work. Make the hard call. Love the life you're living.</p>

    <div class="cta">
      <p class="big">SET YOUR COURSE.</p>
      <p class="meta">VIBRANT LIFE LAUNCH PAD &middot; AGES 15 TO 18 &middot; [ LEARN MORE: CONTACT / QR ]</p>
    </div>
  </div>
</div>
</body>
</html>
