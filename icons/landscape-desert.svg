<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMax slice">
  <defs>
    <linearGradient id="dsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8c48a"/>
      <stop offset="1" stop-color="#f0d9a8"/>
    </linearGradient>
    <style>
      .road-stripe { animation: road-flow 1.4s linear infinite; }
      @keyframes road-flow { to { stroke-dashoffset: -30; } }
    </style>
  </defs>
  <rect width="1200" height="600" fill="url(#dsky)"/>
  <circle cx="940" cy="200" r="60" fill="#f4d690" opacity="0.85"/>
  <!-- Background dunes (lighter, higher peaks) - distant horizon -->
  <path d="M0 480 Q200 420 400 460 T800 450 T1200 480 L1200 600 L0 600 Z" fill="#c9a567" opacity="0.85"/>
  <!-- Small camel silhouette on the highest left dune peak (~x=240, surface ~y=444) -->
  <g fill="#4a3725" opacity="0.85">
    <ellipse cx="240" cy="436" rx="18" ry="5"/>
    <ellipse cx="234" cy="430" rx="6" ry="5"/>
    <ellipse cx="246" cy="430" rx="6" ry="5"/>
    <path d="M 225 433 Q 219 424 217 418 L 220 418 Q 222 423 228 432 Z"/>
    <ellipse cx="217" cy="416" rx="3" ry="2.5"/>
    <ellipse cx="213" cy="417" rx="2" ry="1.5"/>
    <rect x="227" y="440" width="2" height="6"/>
    <rect x="232" y="440" width="2" height="6"/>
    <rect x="246" y="440" width="2" height="6"/>
    <rect x="251" y="440" width="2" height="6"/>
  </g>
  <!-- Foreground darker sand raised to meet the road at horizon (y=500) -->
  <path d="M0 510 Q300 470 600 500 T1200 490 L1200 600 L0 600 Z" fill="#b08a4e" opacity="0.85"/>
  <!-- Perspective road: vanishing point lowered to meet sand horizon -->
  <polygon points="585,500 615,500 880,600 320,600" fill="#d4b283" opacity="0.9"/>
  <polygon points="592,500 608,500 720,600 480,600" fill="#c49968" opacity="0.7"/>
  <!-- Center dashed stripe -->
  <line class="road-stripe" x1="600" y1="510" x2="600" y2="600" stroke="#f4e8c8" stroke-width="2.5" stroke-dasharray="14,16" opacity="0.85"/>
</svg>
