<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMax slice">
  <defs>
    <linearGradient id="fsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b8cdb0"/>
      <stop offset="1" stop-color="#d4dec8"/>
    </linearGradient>
    <style>
      .road-stripe { animation: road-flow 1.4s linear infinite; }
      @keyframes road-flow { to { stroke-dashoffset: -30; } }
    </style>
  </defs>
  <rect width="1200" height="600" fill="url(#fsky)"/>
  <!-- Perspective road first so trees layer on top, framing the path -->
  <polygon points="585,440 615,440 870,600 330,600" fill="#8a6f4f" opacity="0.9"/>
  <polygon points="593,440 607,440 720,600 480,600" fill="#6f5840" opacity="0.85"/>
  <line class="road-stripe" x1="600" y1="455" x2="600" y2="600" stroke="#e8d8b0" stroke-width="2.5" stroke-dasharray="14,16" opacity="0.85"/>
  <!-- Trees on the sides of the road -->
  <g fill="#6b8f5e" opacity="0.6">
    <polygon points="80,520 60,420 100,420"/>
    <polygon points="180,540 150,400 210,400"/>
    <polygon points="280,520 250,410 310,410"/>
    <polygon points="400,500 360,400 440,400"/>
    <polygon points="800,500 760,400 840,400"/>
    <polygon points="920,520 890,410 950,410"/>
    <polygon points="1020,540 990,400 1050,400"/>
    <polygon points="1120,540 1090,400 1150,400"/>
  </g>
  <g fill="#4a6741" opacity="0.7">
    <polygon points="50,560 20,430 80,430"/>
    <polygon points="240,560 200,400 280,400"/>
    <polygon points="450,560 420,420 480,420"/>
    <polygon points="730,560 700,420 760,420"/>
    <polygon points="940,560 910,420 970,420"/>
    <polygon points="1170,560 1140,400 1200,400"/>
  </g>
  <rect y="555" width="1200" height="45" fill="#4a6741" opacity="0.85"/>
  <!-- Re-draw the road's foreground edge on top of the ground strip -->
  <polygon points="445,555 755,555 870,600 330,600" fill="#8a6f4f" opacity="0.95"/>
  <line class="road-stripe" x1="600" y1="555" x2="600" y2="600" stroke="#e8d8b0" stroke-width="2.5" stroke-dasharray="14,16" opacity="0.9"/>
</svg>
