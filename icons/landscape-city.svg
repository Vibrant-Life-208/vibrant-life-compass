<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMax slice">
  <defs>
    <linearGradient id="csky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c4bfb6"/>
      <stop offset="1" stop-color="#d8d4cc"/>
    </linearGradient>
    <style>
      .road-stripe { animation: road-flow 1.2s linear infinite; }
      @keyframes road-flow { to { stroke-dashoffset: -36; } }
    </style>
  </defs>
  <rect width="1200" height="600" fill="url(#csky)"/>
  <!-- Ground floor band (the city's asphalt plane, mostly hidden by buildings/road) -->
  <rect y="500" width="1200" height="100" fill="#4a3f33" opacity="0.95"/>
  <!-- ===== BACK LAYER (furthest, lightest, smallest, near road horizon) ===== -->
  <g fill="#9b8b75" opacity="0.85">
    <!-- Left back row: extends close to road's horizon x=585 -->
    <rect x="0" y="290" width="80" height="210"/>
    <rect x="85" y="260" width="75" height="240"/>
    <rect x="165" y="280" width="90" height="220"/>
    <rect x="260" y="250" width="80" height="250"/>
    <rect x="345" y="270" width="85" height="230"/>
    <rect x="435" y="260" width="70" height="240"/>
    <rect x="510" y="280" width="75" height="220"/>
    <!-- Right back row: extends close to road's horizon x=615 -->
    <rect x="615" y="280" width="75" height="220"/>
    <rect x="695" y="260" width="70" height="240"/>
    <rect x="770" y="270" width="85" height="230"/>
    <rect x="860" y="250" width="80" height="250"/>
    <rect x="945" y="280" width="90" height="220"/>
    <rect x="1040" y="260" width="75" height="240"/>
    <rect x="1120" y="290" width="80" height="210"/>
  </g>
  <!-- ===== MID LAYER (medium depth, medium darkness) ===== -->
  <g fill="#7b6850" opacity="0.9">
    <!-- Left mid row -->
    <rect x="0" y="200" width="90" height="300"/>
    <rect x="95" y="170" width="100" height="330"/>
    <rect x="200" y="190" width="85" height="310"/>
    <rect x="290" y="160" width="95" height="340"/>
    <rect x="390" y="200" width="75" height="300"/>
    <!-- Right mid row -->
    <rect x="735" y="200" width="75" height="300"/>
    <rect x="815" y="160" width="95" height="340"/>
    <rect x="915" y="190" width="85" height="310"/>
    <rect x="1005" y="170" width="100" height="330"/>
    <rect x="1110" y="200" width="90" height="300"/>
  </g>
  <!-- ===== FRONT LAYER (closest, darkest, tallest, towering) ===== -->
  <g fill="#3d2f1f" opacity="0.95">
    <!-- Left front row: right edge follows road's bottom-left edge (x=320) -->
    <rect x="0" y="100" width="120" height="400"/>
    <rect x="125" y="70" width="110" height="430"/>
    <rect x="240" y="110" width="80" height="390"/>
    <!-- Right front row: left edge follows road's bottom-right edge (x=880) -->
    <rect x="880" y="110" width="80" height="390"/>
    <rect x="965" y="70" width="110" height="430"/>
    <rect x="1080" y="100" width="120" height="400"/>
  </g>
  <!-- Thin curb lines right at the road's perspective edges (concrete edging) -->
  <line x1="585" y1="500" x2="320" y2="600" stroke="#a8a39a" stroke-width="2.5" opacity="0.8"/>
  <line x1="615" y1="500" x2="880" y2="600" stroke="#a8a39a" stroke-width="2.5" opacity="0.8"/>
  <!-- Perspective city street -->
  <polygon points="585,500 615,500 880,600 320,600" fill="#3a3128" opacity="0.95"/>
  <polygon points="593,500 607,500 730,600 470,600" fill="#2a2218" opacity="0.85"/>
  <!-- Yellow center line (animated dashes) -->
  <line class="road-stripe" x1="600" y1="510" x2="600" y2="600" stroke="#f4d690" stroke-width="3" stroke-dasharray="18,16" opacity="0.95"/>
  <!-- Window lights scattered across all three building layers, denser on front -->
  <g fill="#f4e8c8" opacity="0.7">
    <!-- Back layer windows (dim, scattered) -->
    <rect x="30" y="320" width="5" height="8"/>
    <rect x="110" y="290" width="5" height="8"/>
    <rect x="190" y="310" width="5" height="8"/>
    <rect x="290" y="280" width="5" height="8"/>
    <rect x="380" y="310" width="5" height="8"/>
    <rect x="460" y="290" width="5" height="8"/>
    <rect x="540" y="320" width="5" height="8"/>
    <rect x="650" y="310" width="5" height="8"/>
    <rect x="720" y="290" width="5" height="8"/>
    <rect x="800" y="310" width="5" height="8"/>
    <rect x="890" y="280" width="5" height="8"/>
    <rect x="980" y="320" width="5" height="8"/>
    <rect x="1070" y="290" width="5" height="8"/>
    <!-- Mid layer windows -->
    <rect x="30" y="240" width="5" height="9"/>
    <rect x="50" y="320" width="5" height="9"/>
    <rect x="130" y="210" width="5" height="9"/>
    <rect x="155" y="290" width="5" height="9"/>
    <rect x="220" y="240" width="5" height="9"/>
    <rect x="245" y="350" width="5" height="9"/>
    <rect x="320" y="200" width="5" height="9"/>
    <rect x="350" y="280" width="5" height="9"/>
    <rect x="410" y="250" width="5" height="9"/>
    <rect x="750" y="250" width="5" height="9"/>
    <rect x="830" y="200" width="5" height="9"/>
    <rect x="870" y="280" width="5" height="9"/>
    <rect x="940" y="240" width="5" height="9"/>
    <rect x="975" y="350" width="5" height="9"/>
    <rect x="1040" y="210" width="5" height="9"/>
    <rect x="1075" y="290" width="5" height="9"/>
    <rect x="1140" y="240" width="5" height="9"/>
  </g>
  <!-- Front layer windows (brightest, densest) -->
  <g fill="#f8eebc" opacity="0.85">
    <rect x="30" y="150" width="6" height="10"/>
    <rect x="55" y="200" width="6" height="10"/>
    <rect x="40" y="270" width="6" height="10"/>
    <rect x="80" y="320" width="6" height="10"/>
    <rect x="60" y="400" width="6" height="10"/>
    <rect x="145" y="120" width="6" height="10"/>
    <rect x="180" y="170" width="6" height="10"/>
    <rect x="155" y="230" width="6" height="10"/>
    <rect x="195" y="300" width="6" height="10"/>
    <rect x="170" y="370" width="6" height="10"/>
    <rect x="210" y="440" width="6" height="10"/>
    <rect x="260" y="160" width="6" height="10"/>
    <rect x="285" y="220" width="6" height="10"/>
    <rect x="270" y="310" width="6" height="10"/>
    <rect x="295" y="400" width="6" height="10"/>
    <rect x="895" y="160" width="6" height="10"/>
    <rect x="925" y="220" width="6" height="10"/>
    <rect x="910" y="310" width="6" height="10"/>
    <rect x="940" y="400" width="6" height="10"/>
    <rect x="985" y="120" width="6" height="10"/>
    <rect x="1020" y="170" width="6" height="10"/>
    <rect x="995" y="230" width="6" height="10"/>
    <rect x="1035" y="300" width="6" height="10"/>
    <rect x="1010" y="370" width="6" height="10"/>
    <rect x="1050" y="440" width="6" height="10"/>
    <rect x="1100" y="150" width="6" height="10"/>
    <rect x="1130" y="200" width="6" height="10"/>
    <rect x="1115" y="270" width="6" height="10"/>
    <rect x="1155" y="320" width="6" height="10"/>
    <rect x="1135" y="400" width="6" height="10"/>
  </g>
</svg>
