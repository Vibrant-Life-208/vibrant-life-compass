<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMax slice">
  <defs>
    <linearGradient id="csky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c4bfb6"/>
      <stop offset="1" stop-color="#d8d4cc"/>
    </linearGradient>
    <style>
      .road-stripe { animation: road-flow 1.2s linear infinite; }
      @keyframes road-flow { to { stroke-dashoffset: -36; } }
    </style>
  </defs>
  <rect width="1200" height="600" fill="url(#csky)"/>
  <!-- Background skyline (taller, wider, lighter, set further back) - tops at y=160-200, ending at ground line y=500 -->
  <g fill="#9b8769" opacity="0.65">
    <rect x="0" y="200" width="80" height="300"/>
    <rect x="85" y="170" width="70" height="330"/>
    <rect x="160" y="200" width="85" height="300"/>
    <rect x="250" y="160" width="70" height="340"/>
    <rect x="325" y="190" width="90" height="310"/>
    <rect x="820" y="180" width="80" height="320"/>
    <rect x="905" y="160" width="100" height="340"/>
    <rect x="1010" y="200" width="70" height="300"/>
    <rect x="1085" y="180" width="85" height="320"/>
    <rect x="1175" y="210" width="25" height="290"/>
  </g>
  <!-- Foreground buildings (much taller, wider, darker, more prominent) - tops at y=100-150, ending at ground line y=500 -->
  <g fill="#5a4a36" opacity="0.92">
    <rect x="20" y="140" width="85" height="360"/>
    <rect x="115" y="110" width="100" height="390"/>
    <rect x="225" y="150" width="85" height="350"/>
    <rect x="320" y="130" width="75" height="370"/>
    <rect x="855" y="130" width="85" height="370"/>
    <rect x="950" y="110" width="105" height="390"/>
    <rect x="1065" y="140" width="90" height="360"/>
  </g>
  <!-- Ground floor (the city's pavement plane) - darker base that connects buildings to road -->
  <rect y="500" width="1200" height="100" fill="#6b6357" opacity="0.95"/>
  <!-- Sidewalks: perspective trapezoids meeting the road on either side -->
  <polygon points="485,500 585,500 320,600 0,600" fill="#a8a39a" opacity="0.9"/>
  <polygon points="615,500 715,500 1200,600 880,600" fill="#a8a39a" opacity="0.9"/>
  <!-- Sidewalk curbs: darker edge where sidewalks meet the road -->
  <line x1="585" y1="500" x2="320" y2="600" stroke="#766f63" stroke-width="3" opacity="0.85"/>
  <line x1="615" y1="500" x2="880" y2="600" stroke="#766f63" stroke-width="3" opacity="0.85"/>
  <!-- Sidewalk cross-panel lines (receding-plane texture) -->
  <line x1="430" y1="540" x2="180" y2="540" stroke="#8b857b" stroke-width="1.5" opacity="0.5"/>
  <line x1="370" y1="580" x2="100" y2="580" stroke="#8b857b" stroke-width="1.5" opacity="0.5"/>
  <line x1="670" y1="540" x2="900" y2="540" stroke="#8b857b" stroke-width="1.5" opacity="0.5"/>
  <line x1="730" y1="580" x2="1050" y2="580" stroke="#8b857b" stroke-width="1.5" opacity="0.5"/>
  <!-- Perspective city street -->
  <polygon points="585,500 615,500 880,600 320,600" fill="#4a3f33" opacity="0.95"/>
  <polygon points="593,500 607,500 730,600 470,600" fill="#3a3128" opacity="0.85"/>
  <!-- Yellow center line (animated dashes) -->
  <line class="road-stripe" x1="600" y1="510" x2="600" y2="600" stroke="#f4d690" stroke-width="3" stroke-dasharray="18,16" opacity="0.95"/>
  <!-- Window lights scattered across the taller building facades -->
  <g fill="#f4e8c8" opacity="0.65">
    <rect x="40" y="200" width="6" height="10"/>
    <rect x="65" y="240" width="6" height="10"/>
    <rect x="50" y="320" width="6" height="10"/>
    <rect x="80" y="380" width="6" height="10"/>
    <rect x="140" y="170" width="6" height="10"/>
    <rect x="175" y="220" width="6" height="10"/>
    <rect x="155" y="290" width="6" height="10"/>
    <rect x="190" y="360" width="6" height="10"/>
    <rect x="170" y="430" width="6" height="10"/>
    <rect x="250" y="200" width="6" height="10"/>
    <rect x="275" y="270" width="6" height="10"/>
    <rect x="260" y="350" width="6" height="10"/>
    <rect x="290" y="420" width="6" height="10"/>
    <rect x="340" y="180" width="6" height="10"/>
    <rect x="365" y="240" width="6" height="10"/>
    <rect x="355" y="320" width="6" height="10"/>
    <rect x="380" y="400" width="6" height="10"/>
    <rect x="875" y="180" width="6" height="10"/>
    <rect x="905" y="240" width="6" height="10"/>
    <rect x="890" y="320" width="6" height="10"/>
    <rect x="920" y="400" width="6" height="10"/>
    <rect x="970" y="160" width="6" height="10"/>
    <rect x="1000" y="220" width="6" height="10"/>
    <rect x="985" y="290" width="6" height="10"/>
    <rect x="1025" y="360" width="6" height="10"/>
    <rect x="1010" y="430" width="6" height="10"/>
    <rect x="1085" y="200" width="6" height="10"/>
    <rect x="1115" y="270" width="6" height="10"/>
    <rect x="1095" y="350" width="6" height="10"/>
    <rect x="1130" y="420" width="6" height="10"/>
  </g>
</svg>
